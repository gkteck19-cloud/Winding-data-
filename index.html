<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winding Master Pro - Maa Bhagawati Electrical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 pb-32">

    <header class="text-center mb-6">
        <h1 class="text-3xl font-bold text-orange-500">Winding Master</h1>
        <p class="text-xs text-slate-400 uppercase tracking-widest">Maa Bhagawati Electrical, Sagona</p>
    </header>

    <div class="mb-6 sticky top-2 z-10">
        <input type="text" id="searchInput" placeholder="सर्च मोटर (नाम से)..." class="input-field shadow-2xl" onkeyup="searchMotor()">
    </div>

    <div id="motorList" class="space-y-4"></div>

    <button type="button" onclick="openForm()" id="floatingAddBtn" class="fixed bottom-24 right-6 w-16 h-16 bg-orange-500 rounded-full shadow-lg text-4xl flex items-center justify-center z-40 active:scale-90 transition text-white font-bold cursor-pointer">
        +
    </button>

    <div class="fixed bottom-0 left-0 right-0 bg-slate-900 p-4 flex gap-3 border-t border-slate-700 z-40">
        <button type="button" onclick="exportData()" class="flex-grow bg-blue-600 text-white py-3 rounded-xl font-bold text-sm">💾 बैकअप लें</button>
        <button type="button" onclick="document.getElementById('importFile').click()" class="flex-grow bg-green-600 text-white py-3 rounded-xl font-bold text-sm">📥 फाइल लोड करें</button>
        <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
    </div>

    <div id="entryModal" class="fixed inset-0 modal-bg hidden z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 w-full max-w-lg rounded-2xl p-6 overflow-y-auto max-h-[90vh] shadow-2xl border border-slate-700">
            <h2 id="formTitle" class="text-2xl font-bold mb-4 text-orange-400 border-b border-slate-700 pb-2">नया डेटा जोड़ें</h2>
            <form id="windingForm" class="space-y-4 text-sm">
                <input type="hidden" id="editId">
                <input type="text" id="motorName" placeholder="मोटर का नाम" class="input-field" required>
                
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="idSize" placeholder="ID Size" class="input-field">
                    <input type="text" id="odSize" placeholder="OD Size" class="input-field">
                    <input type="text" id="stamping" placeholder="Core Size" class="input-field">
                    <input type="number" id="slots" placeholder="Slots" class="input-field">
                </div>

                <div class="bg-slate-700/50 p-2 rounded-lg border border-slate-600">
                    <label class="text-xs text-slate-400 block mb-1">वायर टाइप:</label>
                    <select id="wireType" class="input-field bg-slate-800">
                        <option value="Copper">Copper (तांबा)</option>
                        <option value="Aluminium">Aluminium (एल्युमिनियम)</option>
                    </select>
                </div>
                
                <input type="file" id="photoInput" accept="image/*" class="input-field text-xs">
                
                <div class="grid grid-cols-1 gap-4">
                    <div class="bg-blue-900/20 p-3 rounded-xl border border-blue-500/30">
                        <p class="text-blue-400 font-bold mb-2 uppercase text-[10px]">Running</p>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="rSWG" placeholder="SWG" class="input-field">
                            <input type="text" id="rTurns" placeholder="Turns" class="input-field">
                            <input type="text" id="rWeight" placeholder="Weight" class="input-field">
                            <input type="text" id="rLength" placeholder="Length" class="input-field">
                        </div>
                    </div>
                    <div class="bg-green-900/20 p-3 rounded-xl border border-green-500/30">
                        <p class="text-green-400 font-bold mb-2 uppercase text-[10px]">Starting</p>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="sSWG" placeholder="SWG" class="input-field">
                            <input type="text" id="sTurns" placeholder="Turns" class="input-field">
                            <input type="text" id="sWeight" placeholder="Weight" class="input-field">
                            <input type="text" id="sLength" placeholder="Length" class="input-field">
                        </div>
                    </div>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeForm()" class="w-1/2 bg-slate-700 py-3 rounded-xl font-bold">कैंसिल</button>
                    <button type="submit" id="saveBtn" class="w-1/2 bg-orange-500 py-3 rounded-xl font-bold">सेव करें</button>
                </div>
            </form>
        </div>
    </div>

    <div id="detailsModal" class="fixed inset-0 modal-bg hidden z-50 flex items-center justify-center p-4">
        <div id="detailsContent" class="bg-slate-800 w-full max-w-lg rounded-2xl overflow-hidden shadow-2xl relative min-h-[500px]"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
