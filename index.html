<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winding Master Pro - Maa Bhagawati Electrical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 pb-32">

    <header class="text-center mb-6">
        <h1 class="text-3xl font-bold text-orange-500">Winding Master</h1>
        <p class="text-xs text-slate-400 uppercase">Maa Bhagawati Electrical, Sagona</p>
    </header>

    <div class="mb-6 sticky top-2 z-10">
        <input type="text" id="searchInput" placeholder="सर्च मोटर (नाम से)..." class="input-field shadow-2xl" onkeyup="searchMotor()">
    </div>

    <div id="motorList" class="space-y-4"></div>

    <button onclick="openForm()" class="fixed bottom-24 right-6 w-16 h-16 bg-orange-500 rounded-full shadow-lg text-4xl flex items-center justify-center z-40 active:scale-90 transition">+</button>

    <div class="fixed bottom-0 left-0 right-0 bg-slate-900 p-4 flex gap-3 border-t border-slate-700 z-40">
        <button onclick="exportData()" class="flex-grow bg-blue-600 text-white py-3 rounded-xl font-bold text-sm">💾 बैकअप लें</button>
        <button onclick="document.getElementById('importFile').click()" class="flex-grow bg-green-600 text-white py-3 rounded-xl font-bold text-sm">📥 फाइल लोड करें</button>
        <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
    </div>

    <div id="entryModal" class="fixed inset-0 modal-bg hidden z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 w-full max-w-lg rounded-2xl p-6 overflow-y-auto max-h-[90vh] shadow-2xl border border-slate-700">
            <h2 class="text-2xl font-bold mb-4 text-orange-400 border-b border-slate-700 pb-2">नया डेटा जोड़ें</h2>
            <form id="windingForm" class="space-y-4 text-sm">
                <input type="text" id="motorName" placeholder="मोटर का नाम" class="input-field" required>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="idSize" placeholder="ID (अंदर का साइज)" class="input-field">
                    <input type="text" id="odSize" placeholder="OD (बाहर का साइज)" class="input-field">
                    <input type="text" id="stamping" placeholder="स्टांपिंग साइज" class="input-field">
                    <input type="number" id="slots" placeholder="कुल स्लॉट" class="input-field">
                </div>
                
                <label class="block text-slate-400 text-xs">मोटर की फोटो चुनें (Optional):</label>
                <input type="file" id="photoInput" accept="image/*" class="input-field">
                
                <div class="bg-blue-900/20 p-3 rounded-xl border border-blue-500/30">
                    <p class="text-blue-400 font-bold mb-2 uppercase text-[10px]">Running Coil (रनिंग)</p>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="rSWG" placeholder="SWG" class="input-field">
                        <input type="text" id="rTurns" placeholder="Turns" class="input-field">
                        <input type="text" id="rWeight" placeholder="वजन (ग्राम)" class="input-field">
                        <input type="text" id="rLength" placeholder="फरमा लंबाई" class="input-field">
                    </div>
                </div>

                <div class="bg-green-900/20 p-3 rounded-xl border border-green-500/30">
                    <p class="text-green-400 font-bold mb-2 uppercase text-[10px]">Starting Coil (स्टार्टिंग)</p>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="sSWG" placeholder="SWG" class="input-field">
                        <input type="text" id="sTurns" placeholder="Turns" class="input-field">
                        <input type="text" id="sWeight" placeholder="वजन (ग्राम)" class="input-field">
                        <input type="text" id="sLength" placeholder="फरमा लंबाई" class="input-field">
                    </div>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeForm()" class="w-1/3 bg-slate-700 py-3 rounded-xl">कैंसिल</button>
                    <button type="submit" class="w-2/3 bg-orange-500 py-3 rounded-xl font-bold">डेटा सेव करें</button>
                </div>
            </form>
        </div>
    </div>

    <div id="detailsModal" class="fixed inset-0 modal-bg hidden z-50 flex items-center justify-center p-4">
        <div id="detailsContent" class="bg-slate-800 w-full max-w-lg rounded-2xl overflow-hidden shadow-2xl relative min-h-[500px]">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
